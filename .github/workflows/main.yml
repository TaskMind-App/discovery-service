name: Discovery Service CI/CD

on:
  push:
    branches: [ "main", "master" ]
    # כדאי להוסיף סינון כדי שהבילד ירוץ רק כשמשתנים קבצים בתוך התיקייה הרלוונטית
    paths:
      - 'discovery-service/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package -DskipTests -pl discovery-service -am

      - name: Build Docker Image
        run: |
          cd discovery-service
          docker build -t taskmind-discovery-service .